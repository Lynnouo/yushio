<!doctype html>
<html lang="zh-CN" data-lang="cn" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>夕潮 · Yushio — AI 协作者人格</title>
  <meta name="description" content="An AI collaborator persona for Claude Code. Five layered skills (base + art director + auditor + parallel + VI), portable across 6+ AI tools.">

  <!-- Fonts: Spectral (serif, poetic), Manrope (sans), JetBrains Mono (mono), Noto Serif/Sans SC (CN) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+SC:wght@300;400;500&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <!-- React 18 (pinned) + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <!-- Hydrate theme + lang from localStorage before paint to avoid FOUC.
       Mirrors the keys written by App in app.jsx ("yushio-prefs"). -->
  <script>
    (function(){try{
      var p=localStorage.getItem("yushio-prefs");
      if(!p)return;
      p=JSON.parse(p);
      var h=document.documentElement;
      if(p.lang==="cn"||p.lang==="en")h.setAttribute("data-lang",p.lang);
      if(p.theme==="dark"||p.theme==="light")h.setAttribute("data-theme",p.theme);
    }catch(_){}}());
  </script>
  <div id="root"></div>

  <!-- Bilingual content store -->
  <script src="content.js"></script>

  <!-- Tweaks panel: useTweaks + TweaksPanel + Tweak* controls on window -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- Main app -->
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
